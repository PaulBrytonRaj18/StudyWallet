server {
    listen 443 ssl http2;
    server_name api.studywallet.app;

    ssl_certificate /etc/letsencrypt/live/api.studywallet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.studywallet.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/docs {
        proxy_pass http://127.0.0.1:8000/api/docs;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log;
}

server {
    listen 80;
    server_name api.studywallet.app;
    return 301 https://$host$request_uri;
}
